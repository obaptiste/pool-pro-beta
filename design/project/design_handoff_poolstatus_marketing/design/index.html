<script>
// Suppress benign ResizeObserver warning
(() => {
  const re = /ResizeObserver loop/;
  window.addEventListener('error', (e) => {
    if (e.message && re.test(e.message)) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
  }, true);
  const origError = window.console.error;
  window.console.error = function(...a) {
    if (a[0] && typeof a[0] === 'string' && re.test(a[0])) return;
    return origError.apply(this, a);
  };
})();
</script>

<script type="text/babel" data-presets="react">
// Shared sprites / primitives for PoolStatus AI landing page
// Exported on window for cross-file usage.
const { useState, useEffect, useMemo, useRef } = React;

function Icon({ name, size = 16, color, style, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = "";
    const el = document.createElement("i");
    el.setAttribute("data-lucide", name);
    ref.current.appendChild(el);
    if (window.lucide) window.lucide.createIcons({ nameAttr: "data-lucide" });
    // Force icon size
    requestAnimationFrame(() => {
      const svg = ref.current && ref.current.querySelector("svg");
      if (svg) {
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        if (color) svg.setAttribute("stroke", color);
      }
    });
  }, [name, size, color]);
  return (
    <span
      ref={ref}
      className={className}
      style={{ display: "inline-flex", width: size, height: size, color, lineHeight: 0, ...style }}
    />
  );
}

// Label in ALL CAPS tracking
function Label({ children, accent, style }) {
  return (
    <span
      className={"lbl" + (accent ? " lbl-accent" : "")}
      style={style}
    >
      {children}
    </span>
  );
}

// Wordmark with cyan "Status"
function Wordmark({ size = 16 }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <img src="assets/mark.svg" alt="" style={{ width: size + 8, height: size + 8 }} />
      <div className="wordmark" style={{ fontSize: size }}>
        Pool<span className="acc">Status</span>
      </div>
    </div>
  );
}

// Sparkline SVG
function Sparkline({ values, color = "#4FC3F7", width = 80, height = 28 }) {
  if (!values || values.length < 2) return null;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pts = values
    .map((v, i) => {
      const x = (i / (values.length - 1)) * width;
      const y = height - ((v - min) / range) * height;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  const last = values[values.length - 1];
  const ly = height - ((last - min) / range) * height;
  return (
    <svg width={width} height={height} style={{ overflow: "visible" }}>
      <polyline
        points={pts}
        fill="none"
        stroke={color}
        strokeWidth="1.5"
        strokeLinejoin="round"
        strokeLinecap="round"
        opacity="0.65"
      />
      <circle cx={width} cy={ly} r="2.5" fill={color} />
      <circle cx={width} cy={ly} r="5" fill={color} opacity="0.25" />
    </svg>
  );
}

// Animated number (counts while simulating live telemetry)
function Ticker({ value, decimals = 1, unit, className = "" }) {
  const [display, setDisplay] = useState(value);
  useEffect(() => {
    let raf;
    const start = display;
    const delta = value - start;
    const duration = 500;
    const t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(start + delta * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return (
    <span className={"mono " + className} style={{ fontVariantNumeric: "tabular-nums" }}>
      {display.toFixed(decimals)}
      {unit ? <span style={{ fontSize: ".55em", color: "#4A6A80", marginLeft: 4 }}>{unit}</span> : null}
    </span>
  );
}

// Status chip
function StatusChip({ status }) {
  const map = {
    ok: { bg: "rgba(16,185,129,.1)", bd: "rgba(16,185,129,.3)", fg: "#34D399", t: "✓ NOMINAL" },
    watch: { bg: "rgba(245,158,11,.1)", bd: "rgba(245,158,11,.3)", fg: "#FBBF24", t: "⚠ WATCH" },
    action: { bg: "rgba(239,68,68,.1)", bd: "rgba(239,68,68,.3)", fg: "#F87171", t: "✕ ACTION" },
  };
  const s = map[status] || map.ok;
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        padding: "3px 8px",
        fontSize: 9,
        fontWeight: 700,
        letterSpacing: ".2em",
        background: s.bg,
        border: `1px solid ${s.bd}`,
        color: s.fg,
        borderRadius: 6,
      }}
    >
      {s.t}
    </span>
  );
}

// Big metric tile
function MetricTile({ label, value, unit, decimals = 1, status = "ok", trend, ideal, accentVar }) {
  const style = {
    ok: { fg: "#34D399", dot: "#10B981" },
    watch: { fg: "#FBBF24", dot: "#F59E0B" },
    action: { fg: "#F87171", dot: "#EF4444" },
  }[status];
  return (
    <div
      className="card"
      style={{
        display: "flex",
        flexDirection: "column",
        gap: 10,
        position: "relative",
        overflow: "hidden",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Label>{label}</Label>
        <Sparkline values={trend} color={style.dot} width={60} height={20} />
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <Ticker value={value} decimals={decimals} unit={unit} className="" />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span className="lbl" style={{ fontSize: 9 }}>
          IDEAL {ideal}
        </span>
        <StatusChip status={status} />
      </div>
    </div>
  );
}

// Pool-water wave SVG backdrop
function WaveBackdrop({ opacity = 0.14 }) {

      <path d="M0,180 Q150,140 300,180 T600,180 T900,180 T1200,180 L1200,300 L0,300 Z" fill="url(#wg)" />
      <path
        d="M0,210 Q150,170 300,210 T600,210 T900,210 T1200,210"
        fill="none"
        stroke="#4FC3F7"
        strokeWidth="1"
        opacity="0.4"
      />
      <path
        d="M0,150 Q150,110 300,150 T600,150 T900,150 T1200,150"
        fill="none"
        stroke="#4FC3F7"
        strokeWidth="1"
        opacity="0.2"
      />
    </svg>
  );
}

// Crosshair / coordinates stamp (console aesthetic)
function Coords({ x = "42.3601°N", y = "71.0589°W", id = "POOL-07A" }) {
  return (
    <div
      className="mono"
      style={{ fontSize: 9, color: "#4A6A80", letterSpacing: ".1em", display: "flex", gap: 14 }}
    >
      <span>
        <Icon name="map-pin" size={10} style={{ marginRight: 4, verticalAlign: "-2px" }} />
        {x} · {y}
      </span>
      <span>UNIT {id}</span>
    </div>
  );
}

// Export
Object.assign(window, {
  Icon,
  Label,
  Wordmark,
  Sparkline,
  Ticker,
  StatusChip,
  MetricTile,
  WaveBackdrop,
  Coords,
});

// Sections for the PoolStatus AI landing page
const { useState: useStateS, useEffect: useEffectS, useMemo: useMemoS, useRef: useRefS } = React;

// ---------- NAV ----------
function Nav({ onCta }) {
  const [scrolled, setScrolled] = useStateS(false);
  useEffectS(() => {
    const onScroll = () => setScrolled(window.scrollY > 12);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <nav
      style={{
        position: "fixed",
        top: 0,
        left: 0,
        right: 0,
        zIndex: 50,
        background: scrolled ? "rgba(6,14,26,.82)" : "transparent",
        backdropFilter: scrolled ? "blur(12px)" : "none",
        borderBottom: scrolled ? "1px solid #1E3A5F" : "1px solid transparent",
        transition: "all .25s",
        padding: "14px 0",

        <div className="hide-sm" style={{ display: "flex", gap: 28, alignItems: "center" }}>
          {["Field Ops", "Telemetry", "AI Protocols", "Pricing", "Docs"].map((t) => (
            <a key={t} href="#" className="lbl" style={{ color: "#8AB4CC", fontSize: 10 }}>
              {t}
            </a>
          ))}
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <a href="#" className="lbl hide-sm" style={{ color: "#8AB4CC" }}>
            Sign In
          </a>
          <button className="btn btn-primary btn-sm" onClick={onCta}>
            <Icon name="log-in" size={12} /> Field Access

        </div>

  );
}

          <div style={{ display: "flex", gap: 16, alignItems: "center" }}>

            {["Docs", "API", "Compliance", "Status", "Privacy"].map((l) => (

// Export
Object.assign(window, {
  Nav, HeroMetric, HeroSplit, HeroScreenshot, TickerStrip,
  Features, LiveTelemetry, HowItWorks, Proof, Pricing, CtaFooter,
});

// App — wires sections, simulates live telemetry, exposes Tweaks
const { useState: useStateA, useEffect: useEffectA, useMemo: useMemoA } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "metric",
  "accent": "#10B981",
  "showLiveTelemetry": true,
  "density": "comfortable"
}/*EDITMODE-END*/;

function clampHist(arr, v) {
  const next = [...arr.slice(-11), v];
  return next;
}

function useTelemetry() {
  const [tele, setTele] = useStateA(() => ({
    fc: 1.5, ph: 7.42, ta: 100, temp: 26, pr: 72, cya: 40, ts: Date.now(),
    fcHist: [1.2, 1.3, 1.1, 1.4, 1.5, 1.4, 1.5, 1.6, 1.5],
    phHist: [7.5, 7.48, 7.46, 7.44, 7.42, 7.44, 7.42, 7.4, 7.42],
    taHist: [98, 100, 99, 101, 100, 102, 100, 99, 100],
    tempHist: [25.5, 25.8, 26, 26.1, 26.2, 26, 26.1, 26, 26],
    prHist: [70, 71, 72, 72, 71, 73, 72, 72, 72],
    cyaHist: [40, 40, 40, 40, 40, 40, 40, 40, 40],
  }));
  useEffectA(() => {
    const id = setInterval(() => {
      setTele((t) => {
        const jitter = (c, amp, lo, hi) => {
          const n = c + (Math.random() - 0.5) * amp;
          return Math.max(lo, Math.min(hi, n));
        };
        const fc = jitter(t.fc, 0.2, 1.1, 1.9);
        const ph = jitter(t.ph, 0.04, 7.35, 7.5);
        const ta = jitter(t.ta, 2, 95, 105);
        const temp = jitter(t.temp, 0.2, 25.5, 26.5);
        const pr = jitter(t.pr, 1.5, 68, 76);
        const cya = jitter(t.cya, 0.4, 39, 41);
        return {
          fc, ph, ta, temp, pr, cya, ts: Date.now(),
          fcHist: clampHist(t.fcHist, fc),
          phHist: clampHist(t.phHist, ph),
          taHist: clampHist(t.taHist, ta),
          tempHist: clampHist(t.tempHist, temp),
          prHist: clampHist(t.prHist, pr),
          cyaHist: clampHist(t.cyaHist, cya),
        };
      });
    }, 1600);
    return () => clearInterval(id);
  }, []);
  return tele;
}

function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;
  const heroOptions = [
    { k: "metric", l: "LSI Metric" },
    { k: "split", l: "Alert → Protocol" },
    { k: "screenshot", l: "Dashboard Mock" },
  ];
  const accentOptions = [
    { k: "#4FC3F7", l: "Cyan" },
    { k: "#10B981", l: "Emerald" },
    { k: "#F59E0B", l: "Amber" },
  ];
  return (
    <div
      style={{
        position: "fixed",
        bottom: 20,
        right: 20,
        zIndex: 100,
        width: 260,
        background: "rgba(13,31,56,.96)",
        backdropFilter: "blur(10px)",
        border: "1px solid #1E3A5F",
        borderRadius: 12,
        boxShadow: "0 20px 40px rgba(0,0,0,.6)",
        padding: 16,
        color: "#fff",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span className="lbl" style={{ color: "#4FC3F7" }}>Tweaks</span>
        <span className="mono" style={{ fontSize: 9, color: "#4A6A80" }}>LIVE</span>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div className="lbl" style={{ marginBottom: 8 }}>Hero Style</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {heroOptions.map((o) => (
            <button
              key={o.k}
              onClick={() => setState({ ...state, hero: o.k })}
              className="lbl"
              style={{
                textAlign: "left",
                padding: "8px 10px",
                borderRadius: 6,
                border: "1px solid " + (state.hero === o.k ? "rgba(79,195,247,.5)" : "#1E3A5F"),
                background: state.hero === o.k ? "rgba(79,195,247,.1)" : "transparent",
                color: state.hero === o.k ? "#4FC3F7" : "#8AB4CC",
                cursor: "pointer",
                fontSize: 10,
              }}
            >
              {o.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div className="lbl" style={{ marginBottom: 8 }}>Accent</div>
        <div style={{ display: "flex", gap: 6 }}>
          {accentOptions.map((o) => (
            <button
              key={o.k}
              onClick={() => setState({ ...state, accent: o.k })}
              style={{
                flex: 1,
                padding: "8px 0",
                borderRadius: 6,
                border: "1px solid " + (state.accent === o.k ? o.k : "#1E3A5F"),
                background: state.accent === o.k ? o.k + "22" : "transparent",
                color: state.accent === o.k ? "#fff" : "#8AB4CC",
                cursor: "pointer",
                fontSize: 9,
                fontWeight: 700,
                letterSpacing: ".2em",
                textTransform: "uppercase",
              }}
            >
              <span style={{ display: "inline-block", width: 10, height: 10, borderRadius: "50%", background: o.k, marginRight: 6, verticalAlign: "-1px" }} />
              {o.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div className="lbl" style={{ marginBottom: 8 }}>Live Telemetry Band</div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
          <input
            type="checkbox"
            checked={state.showLiveTelemetry}
            onChange={(e) => setState({ ...state, showLiveTelemetry: e.target.checked })}
            style={{ accentColor: "#4FC3F7" }}
          />
          <span style={{ fontSize: 11, color: "#8AB4CC" }}>Show streaming telemetry section</span>
        </label>
      </div>

      <div>
        <div className="lbl" style={{ marginBottom: 8 }}>Density</div>
        <div style={{ display: "flex", gap: 4 }}>
          {["compact", "comfortable"].map((d) => (
            <button
              key={d}
              onClick={() => setState({ ...state, density: d })}
              className="lbl"
              style={{
                flex: 1,
                padding: "8px 0",
                borderRadius: 6,
                border: "1px solid " + (state.density === d ? "rgba(79,195,247,.5)" : "#1E3A5F"),
                background: state.density === d ? "rgba(79,195,247,.1)" : "transparent",
                color: state.density === d ? "#4FC3F7" : "#8AB4CC",
                cursor: "pointer",
                fontSize: 9,
              }}
            >
              {d}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, setStateRaw] = useStateA(DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useStateA(false);
  const tele = useTelemetry();

  // Edit mode wiring
  useEffectA(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksVisible(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksVisible(false);
    };
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", handler);
  }, []);

  const setState = (next) => {
    setStateRaw(next);
    const edits = {};
    Object.keys(next).forEach((k) => { if (next[k] !== state[k]) edits[k] = next[k]; });
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*"); } catch {}
  };

  // Apply accent as CSS var
  useEffectA(() => {
    document.documentElement.style.setProperty("--acc", state.accent);
  }, [state.accent]);

  const Hero = state.hero === "split" ? HeroSplit : state.hero === "screenshot" ? HeroScreenshot : HeroMetric;

  const densityScale = state.density === "compact" ? 0.86 : 1;

  return (
    <div style={{ fontSize: `${densityScale * 100}%` }}>
      <Nav />
      <Hero tele={tele} />
      <TickerStrip />
      <Features />
      {state.showLiveTelemetry && <LiveTelemetry tele={tele} />}
      <HowItWorks />
      <Proof />
      <Pricing />
      <CtaFooter />
      <TweaksPanel state={state} setState={setState} visible={tweaksVisible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
